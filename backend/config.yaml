# StockMind Backend Configuration
# 配置文件 - 所有敏感信息使用环境变量或占位符

# ============ 应用配置 ============
app:
  name: "StockMind"
  version: "2.0.0"
  debug: true
  host: "0.0.0.0"
  port: 8000

# ============ 数据库配置 ============
database:
  # SQLite 数据库文件路径
  path: "/root/stock-picker/data/stockmind.db"
  # 连接池大小
  pool_size: 10
  # 连接超时时间（秒）
  timeout: 30

# ============ 资金配置 ============
portfolio:
  # 初始资金（元）
  initial_cash: 100000.0
  # 单只股票最大仓位比例（%）
  max_position_pct: 20.0
  # 最大持仓数量
  max_positions: 5
  # 最大总仓位比例（%）
  max_total_position_pct: 80.0

# ============ 风控配置 ============
risk:
  # 硬止损线（%）
  stop_loss_pct: 8.0
  # 动态止盈触发线（%）
  profit_taking_pct: 20.0
  # 动态止盈回撤线（%）
  trailing_stop_pct: 5.0
  # 持仓最大天数
  max_holding_days: 30

# ============ 选股配置 ============
picker:
  # 价值过滤：PE范围
  pe_range: [5, 50]
  # 价值过滤：PB上限
  pb_max: 5.0
  # 价值过滤：ROE下限（%）
  roe_min: 8.0
  # 价值过滤：净利润增速下限（%）
  profit_growth_min: 5.0
  # 价值过滤：营收增速下限（%）
  revenue_growth_min: 5.0
  # 价值过滤：负债率上限（%）
  debt_ratio_max: 60.0
  # 价值过滤：商誉/净资产上限（%）
  goodwill_ratio_max: 30.0
  # 上市时间要求（天）
  min_listed_days: 365
  # 趋势过滤：均线周期
  ma_short: 5
  ma_long: 20
  # 趋势过滤：RSI范围
  rsi_range: [30, 75]
  # 趋势过滤：成交量倍数
  volume_ratio: 1.3
  # 候选池A阈值（技术面通过数）
  tech_pass_count: 4

# ============ 回测配置 ============
backtest:
  # 默认初始资金
  default_cash: 100000.0
  # 默认回测天数
  default_days: 730
  # 手续费（买卖千分之）
  commission: 0.0003
  # 印花税（卖时千分之）
  stamp_duty: 0.0005
  # 滑点（%）
  slippage: 0.005
  # 基准代码（沪深300）
  benchmark: "000300"

# ============ AI服务配置 ============
ai:
  # MiniMax API 配置（请替换为真实密钥）
  minimax:
    api_key: "YOUR_MINIMAX_API_KEY_HERE"
    api_url: "https://api.minimax.chat/v1/text/chatcompletion_v2"
    model: "MiniMax-Text-01"
    # 代理地址（如需要）
    proxy: null
    # 请求超时时间（秒）
    timeout: 60
    # 最大token数
    max_tokens: 4096

# ============ 飞书推送配置 ============
feishu:
  # 飞书机器人 Webhook URL（请替换为真实URL）
  webhook_url: "YOUR_FEISHU_WEBHOOK_URL_HERE"
  # 是否启用
  enabled: false
  # 推送时间（每日）
  daily_push_time: "16:00"

# ============ 缓存配置 ============
cache:
  # 数据缓存时间（秒）
  data_ttl: 300
  # K线数据缓存时间（秒）
  kline_ttl: 60
  # 最大缓存条目数
  max_size: 1000

# ============ 日志配置 ============
logging:
  # 日志级别
  level: "INFO"
  # 日志文件路径
  file: "/root/stock-picker/data/logs/app.log"
  # 最大保留天数
  rotation_days: 30